services:
  repo:
    image: ${CIRCLE_PROJECT_REPONAME:-repo}:latest
    build:
      context: .
      args:
        - dev=true
        - UID=${UID:-1000}
    volumes:
      - .:/srv/app
    command: "python manage.py runserver 0.0.0.0:8000"
    ports:
      - "10010:8000"
    tty: true
    stdin_open: true
    env_file:
      - .env
    depends_on:
      place-image-db:
        condition: service_healthy
    restart: on-failure
    networks:
      - repo
      - pincamp-local-proxy

  place-image-db:
    image: postgres:14-alpine
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_DB=place_image
      - POSTGRES_USER=place_image
      - POSTGRES_PASSWORD=place_image
    ports:
      - "10011:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U place_image -d place_image"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - repo

volumes:
  postgres_data:
    driver: local

networks:
  repo:
    driver: bridge
  pincamp-local-proxy:
    name: pincamp-local-net
